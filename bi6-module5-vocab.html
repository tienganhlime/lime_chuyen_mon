<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module 5 – Vocab Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f4ff;--white:#fff;--border:#dde3f5;
  --primary:#3b5bdb;--primary-light:#dbe4ff;
  --green:#2f9e44;--green-light:#d3f9d8;
  --red:#e03131;--red-light:#ffe3e3;
  --orange:#e8590c;--orange-light:#fff4e6;
  --purple:#7048e8;--purple-light:#f3f0ff;
  --teal:#0c8599;--teal-light:#e3fafc;
  --pink:#d6336c;--pink-light:#ffdeeb;
  --yellow:#e67700;--yellow-light:#fff9db;
  --text:#1c2040;--muted:#6c757d;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:linear-gradient(135deg,#3b5bdb,#7048e8);padding:18px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;box-shadow:0 4px 20px rgba(59,91,219,.25);}
header h1{font-family:'Baloo 2',sans-serif;font-size:clamp(18px,3vw,28px);color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.2);}
header span{font-size:clamp(12px,1.6vw,15px);color:rgba(255,255,255,.8);}
.tab-row{display:flex;gap:4px;padding:14px 18px 0;flex-wrap:wrap;background:var(--white);border-bottom:2px solid var(--border);}
.tab-btn{font-family:'Nunito',sans-serif;font-size:clamp(11px,1.5vw,14px);font-weight:800;padding:8px 12px;border-radius:10px 10px 0 0;border:2px solid var(--border);border-bottom:none;background:var(--bg);cursor:pointer;color:var(--muted);transition:all .15s;white-space:nowrap;}
.tab-btn.active{background:var(--white);color:var(--primary);border-color:var(--primary);position:relative;top:2px;}
main{padding:22px 18px 60px;max-width:880px;margin:0 auto;}
.panel{display:none;}
.panel.active{display:block;}
.section-card{background:var(--white);border:2px solid var(--border);border-radius:20px;padding:26px 26px 22px;box-shadow:0 2px 16px rgba(59,91,219,.07);margin-bottom:24px;}
.toolbar{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
.btn{font-family:'Nunito',sans-serif;font-size:clamp(13px,1.8vw,15px);font-weight:800;padding:9px 18px;border-radius:10px;border:none;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:#2f4ac0;transform:translateY(-1px);}
.btn-orange{background:var(--orange);color:#fff;}
.btn-orange:hover{background:#c94c08;}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{background:#257a36;}
.btn-purple{background:var(--purple);color:#fff;}
.btn-purple:hover{background:#5e38c5;}
.btn-pink{background:var(--pink);color:#fff;}
.btn-pink:hover{background:#b22757;}
.btn-gray{background:#e9ecef;color:var(--text);}
.btn-gray:hover{background:#dee2e6;}
.btn-teal{background:var(--teal);color:#fff;}
.btn-teal:hover{background:#0a6b7a;}
.btn-yellow{background:var(--yellow);color:#fff;}
.btn-yellow:hover{background:#b35b00;}
.btn-sm{font-size:clamp(12px,1.5vw,13px);padding:6px 13px;}
.progress-bar{background:var(--border);border-radius:99px;height:9px;margin-bottom:16px;overflow:hidden;}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--primary),var(--teal));transition:width .4s;}
.progress-text{display:flex;justify-content:space-between;font-size:clamp(12px,1.6vw,14px);color:var(--muted);font-weight:700;margin-bottom:5px;}
.q-label{font-size:clamp(11px,1.4vw,13px);font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.q-label .badge{font-size:11px;padding:3px 10px;border-radius:50px;background:var(--primary-light);color:var(--primary);}
.q-word{font-family:'Baloo 2',sans-serif;font-size:clamp(26px,5vw,50px);font-weight:800;color:var(--text);margin-bottom:4px;line-height:1.2;}
.q-sentence{font-size:clamp(16px,2.6vw,22px);font-weight:700;line-height:1.8;margin-bottom:16px;color:var(--text);}
.q-sentence .blank{display:inline-block;min-width:90px;border-bottom:3px solid var(--primary);color:var(--primary);text-align:center;padding:0 6px;}
.q-hint{font-size:clamp(13px,1.7vw,15px);color:var(--muted);font-style:italic;margin-bottom:16px;}
.q-emoji{font-size:clamp(40px,7vw,72px);margin-bottom:8px;text-align:center;display:block;}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.opt-btn{font-family:'Nunito',sans-serif;font-size:clamp(14px,2.1vw,20px);font-weight:700;padding:14px 16px;border-radius:14px;border:2.5px solid var(--border);background:#fff;cursor:pointer;transition:all .15s;text-align:left;display:flex;align-items:center;gap:8px;line-height:1.3;}
.opt-letter{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;background:var(--primary-light);color:var(--primary);border-radius:50%;font-size:12px;flex-shrink:0;font-weight:900;}
.opt-btn:hover:not(:disabled){border-color:var(--primary);background:var(--primary-light);}
.opt-btn:hover:not(:disabled) .opt-letter{background:var(--primary);color:#fff;}
.opt-btn.correct{background:var(--green-light);border-color:var(--green);color:var(--green);}
.opt-btn.correct .opt-letter{background:var(--green);color:#fff;}
.opt-btn.wrong{background:var(--red-light);border-color:var(--red);color:var(--red);}
.opt-btn.wrong .opt-letter{background:var(--red);color:#fff;}
.opt-btn:disabled{cursor:default;}
.options-1col{grid-template-columns:1fr;}
.feedback{display:none;padding:12px 16px;border-radius:12px;font-size:clamp(13px,1.8vw,17px);font-weight:700;margin-bottom:14px;line-height:1.5;}
.feedback.show{display:block;}
.feedback.ok{background:var(--green-light);color:var(--green);}
.feedback.bad{background:var(--red-light);color:var(--red);}
.answer-box{display:none;padding:12px 16px;border-radius:12px;background:var(--yellow-light);border:2px solid var(--yellow);font-size:clamp(13px,1.8vw,17px);font-weight:700;color:var(--yellow);margin-bottom:12px;line-height:1.5;}
.answer-box.show{display:block;}
.next-btn{width:100%;padding:14px;border-radius:14px;border:none;font-family:'Nunito',sans-serif;font-size:clamp(15px,2.3vw,20px);font-weight:800;cursor:pointer;background:var(--primary);color:#fff;display:none;transition:all .18s;margin-top:4px;}
.next-btn:hover{background:#2f4ac0;transform:translateY(-2px);}
.next-btn.show{display:block;}
.score-badge{margin-left:auto;font-size:clamp(13px,1.8vw,16px);font-weight:800;color:var(--primary);background:var(--primary-light);padding:7px 16px;border-radius:50px;white-space:nowrap;}
.fill-input{font-family:'Nunito',sans-serif;font-size:clamp(15px,2.2vw,22px);font-weight:700;border:none;border-bottom:3px solid var(--primary);background:transparent;color:var(--primary);outline:none;min-width:110px;width:150px;text-align:center;padding:2px 6px;}
.fill-input.correct{border-color:var(--green);color:var(--green);}
.fill-input.wrong{border-color:var(--red);color:var(--red);}

/* Word Box for fill-blanks */
.word-bank{display:flex;flex-wrap:wrap;gap:8px;padding:14px 16px;background:var(--primary-light);border:2px solid var(--primary);border-radius:14px;margin-bottom:16px;}
.word-chip{font-family:'Nunito',sans-serif;font-size:clamp(13px,2vw,17px);font-weight:700;padding:6px 14px;border-radius:50px;background:#fff;border:2px solid var(--primary);color:var(--primary);cursor:pointer;transition:all .15s;}
.word-chip:hover:not(.used){background:var(--primary);color:#fff;transform:scale(1.05);}
.word-chip.used{opacity:0.35;cursor:default;text-decoration:line-through;}
.word-chip.selected{background:var(--primary);color:#fff;transform:scale(1.05);}

/* Miss-letter: now free-type */
.letter-type-input{font-family:'Baloo 2',sans-serif;font-size:clamp(20px,3.5vw,34px);font-weight:800;border:none;border-bottom:3px solid var(--primary);background:transparent;color:var(--primary);outline:none;text-align:center;padding:4px 8px;width:100%;max-width:320px;display:block;margin:14px auto;}
.letter-type-input.correct{border-color:var(--green);color:var(--green);}
.letter-type-input.wrong{border-color:var(--red);color:var(--red);}
/* Vietnamese meaning display - large */
.vn-big{font-family:'Baloo 2',sans-serif;font-size:clamp(28px,6vw,54px);font-weight:800;color:var(--primary);text-align:center;padding:18px 16px;background:var(--primary-light);border-radius:16px;margin-bottom:18px;line-height:1.3;}

/* Error find */
.error-sentence{font-size:clamp(16px,2.5vw,22px);font-weight:700;line-height:1.8;margin:12px 0;}
.underline-word{cursor:pointer;border-bottom:2.5px dashed var(--muted);padding:1px 3px;border-radius:3px;transition:all .15s;}
.underline-word:hover{background:var(--orange-light);border-color:var(--orange);}
.underline-word.error-found{background:var(--red-light);border-color:var(--red);color:var(--red);}
.underline-word.correct-word{background:var(--green-light);border-color:var(--green);color:var(--green);}

/* Match game - Vietnamese on LEFT, English on RIGHT */
.match-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.match-col-label{font-size:clamp(11px,1.4vw,13px);font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;text-align:center;}
.match-item{font-size:clamp(13px,2vw,18px);font-weight:700;padding:12px 14px;border-radius:12px;border:2.5px solid var(--border);background:#fff;cursor:pointer;transition:all .15s;text-align:center;min-height:48px;display:flex;align-items:center;justify-content:center;margin-bottom:7px;line-height:1.3;gap:6px;}
.match-item:hover:not(.matched):not([disabled]){border-color:var(--purple);background:var(--purple-light);}
.match-item.selected{border-color:var(--purple);background:var(--purple-light);color:var(--purple);transform:scale(1.02);}
.match-item.matched{border-color:var(--green);background:var(--green-light);color:var(--green);cursor:default;}
.match-item.wrong-flash{animation:shake .3s;}
.match-num{font-size:clamp(11px,1.5vw,14px);font-weight:900;color:var(--orange);background:var(--orange-light);border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
@keyframes shake{0%,100%{transform:translateX(0);}30%{transform:translateX(-8px);}70%{transform:translateX(8px);}}

/* TTS */
.tts-btn{font-family:'Nunito',sans-serif;font-size:clamp(15px,2.2vw,20px);font-weight:700;padding:12px 24px;border-radius:12px;border:none;background:var(--primary-light);color:var(--primary);cursor:pointer;display:inline-flex;align-items:center;gap:8px;margin-bottom:16px;transition:all .18s;}
.tts-btn:hover{background:var(--primary);color:#fff;}
.tts-btn.speaking{background:var(--green);color:#fff;animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}
.section-title{font-family:'Baloo 2',sans-serif;font-size:clamp(16px,2.5vw,22px);font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.streak{font-size:clamp(12px,1.6vw,14px);font-weight:800;color:var(--orange);background:var(--orange-light);padding:5px 12px;border-radius:50px;}

/* TTS sub-tabs */
.subtab-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.subtab-btn{font-family:'Nunito',sans-serif;font-size:clamp(12px,1.7vw,15px);font-weight:800;padding:7px 14px;border-radius:10px;border:2px solid var(--border);background:var(--bg);cursor:pointer;color:var(--muted);transition:all .15s;}
.subtab-btn.active{background:var(--teal);color:#fff;border-color:var(--teal);}

@media(max-width:600px){
  .options-grid,.match-cols{grid-template-columns:1fr;}
  main{padding:14px 10px 60px;}
  .section-card{padding:16px 12px 14px;}
}
</style>
</head>
<body>

<header>
  <h1>🌿 Module 5 – Vocabulary Practice</h1>
  <span>GRAM3 · Natural Wonders & Food and Drink</span>
</header>

<div class="tab-row" id="tabRow"></div>
<main><div id="panelContainer"></div></main>

<script>
// ═══════════════════════════════════════════
// VOCAB DATA
// ═══════════════════════════════════════════
const vocab5A = [
  {w:"geography",vn:"địa lý",emoji:"🗺️",def:"The school subject that teaches about countries, mountains, rivers, and the world.",ex:"Hello, welcome to our ___ club.",hard:1},
  {w:"remember",vn:"nhớ",emoji:"🧠",def:"To not forget something; to keep it in your head.",ex:"___ to bring a torch when you go to the cave.",hard:1},
  {w:"wonder",vn:"kỳ quan",emoji:"🏔️",def:"A place or thing so beautiful and amazing that it surprises you.",ex:"Ha Long Bay is a natural ___ of Vietnam.",hard:2},
  {w:"island",vn:"hòn đảo",emoji:"🏝️",def:"A piece of land with water all around it.",ex:"Ha Long Bay has over 1,900 ___.",hard:1},
  {w:"scenery",vn:"phong cảnh",emoji:"🌄",def:"The beautiful things you can see in nature around you – trees, mountains, sky.",ex:"The ___ in Sa Pa is breathtaking in autumn.",hard:3},
  {w:"charming",vn:"hữu tình / quyến rũ",emoji:"😍",def:"Very pretty and pleasant; makes you feel happy to look at it.",ex:"Ha Long Bay is ___ – beautiful and romantic.",hard:3},
  {w:"cave",vn:"hang động",emoji:"🕳️",def:"A big dark hole in the ground or in a rock where you can walk inside.",ex:"Phong Nha is the world's largest ___.",hard:1},
  {w:"waterfall",vn:"thác nước",emoji:"🌊",def:"A place where water falls down from a high rock into a river below.",ex:"Ban Gioc ___ is in Cao Bang province.",hard:1},
  {w:"desert",vn:"sa mạc",emoji:"🏜️",def:"A very large, hot, and dry place with almost no rain and very little water.",ex:"They were lost in the ___ for three days.",hard:1},
  {w:"sunscreen",vn:"kem chống nắng",emoji:"🧴",def:"A cream you put on your skin so the sun does not burn you.",ex:"Don't forget to put on ___ before going to the beach.",hard:3},
  {w:"overnight",vn:"qua đêm",emoji:"🌙",def:"Staying somewhere from the evening until the next morning.",ex:"We stayed ___ at the camping site near the river.",hard:3},
  {w:"plaster",vn:"băng cá nhân",emoji:"🩹",def:"A small sticky strip you put on a cut on your skin to cover and protect it.",ex:"I cut my finger on the rock – I need to put on a ___.",hard:3},
  {w:"backpack",vn:"ba lô",emoji:"🎒",def:"A bag you wear on your back, often used for school or hiking.",ex:"I carry all my gear in my ___ when trekking.",hard:1},
  {w:"compass",vn:"la bàn",emoji:"🧭",def:"A small round tool that always points North and helps you find your way.",ex:"Use a ___ to find the way in the forest.",hard:3},
  {w:"sleeping bag",vn:"túi ngủ",emoji:"🛏️",def:"A big warm bag shaped like a body that you climb inside to sleep when camping.",ex:"He brought his ___ because the nights were very cold.",hard:3},
  {w:"explore",vn:"khám phá",emoji:"🔭",def:"To go to a new place and look around to find out what is there.",ex:"I want to ___ the hidden cave at the end of the trail.",hard:2},
  {w:"waterproof",vn:"không thấm nước",emoji:"🌧️",def:"Keeps water out; does not get wet even in the rain.",ex:"You need a ___ jacket when hiking in the rain.",hard:3},
  {w:"necessary",vn:"cần thiết",emoji:"✅",def:"Something you really must have or do; you cannot do without it.",ex:"Bring ___ things: a torch, a map, and water.",hard:3},
  {w:"landscape",vn:"cảnh quan",emoji:"🌅",def:"The view of a large area of land – fields, hills, rivers – that you can see from far away.",ex:"The ___ of the Red River Delta is flat and green.",hard:3},
  {w:"camping site",vn:"khu cắm trại",emoji:"⛺",def:"An outdoor area where people can set up tents and sleep under the stars.",ex:"This ___ near the river is very popular with families.",hard:3},
  {w:"seafood",vn:"hải sản",emoji:"🦞",def:"Food that comes from the sea, such as fish, shrimp, and crab.",ex:"You can enjoy fresh ___ on the beach in Phu Quoc.",hard:1},
  {w:"luggage",vn:"hành lý",emoji:"🧳",def:"The bags and suitcases that you take with you when you travel.",ex:"Don't take too much ___ – just a small backpack.",hard:2},
];

const vocab5B = [
  {w:"fish sauce",vn:"nước mắm",emoji:"🫙",def:"A salty brown liquid made from fish, used a lot in Vietnamese cooking instead of salt.",ex:"Vietnamese cooking often uses ___ instead of salt.",hard:2},
  {w:"roast chicken",vn:"gà quay",emoji:"🍗",def:"A whole chicken cooked in a hot oven until the skin is golden and crispy.",ex:"Could we have an order of ___ and fried vegetables?",hard:2},
  {w:"fried tofu",vn:"đậu hũ chiên",emoji:"🟡",def:"Soft white tofu cooked in hot oil until the outside becomes crispy and golden.",ex:"I'd like some ___ and spring rolls, please.",hard:1},
  {w:"shrimp",vn:"tôm",emoji:"🦐",def:"A small pink sea animal with a curved body that people eat.",ex:"I like eating ___ cooked with garlic and butter.",hard:1},
  {w:"mineral water",vn:"nước khoáng",emoji:"💧",def:"Water from under the ground, bottled and sold in shops; often has small bubbles.",ex:"We have juice, tea and ___ on the menu.",hard:2},
  {w:"winter melon juice",vn:"nước ép bí đao",emoji:"🥤",def:"A cold sweet drink made from a large green vegetable called winter melon; popular in Vietnam.",ex:"Do you have ___ on the menu today?",hard:3},
  {w:"order",vn:"gọi món",emoji:"📋",def:"To tell a waiter what food or drink you want to have.",ex:"Are you ready to ___? The waiter is waiting.",hard:1},
  {w:"prepare for",vn:"chuẩn bị cho",emoji:"👩‍🍳",def:"To get everything ready before an event or activity.",ex:"She is ___ a big family dinner tonight.",hard:1},
  {w:"ingredient",vn:"nguyên liệu",emoji:"🧂",def:"One food item that you use when cooking a dish, like rice, eggs, or fish sauce.",ex:"Rice noodle is the main ___ of pho.",hard:3},
  {w:"recipe",vn:"công thức nấu ăn",emoji:"📖",def:"A list of food items and step-by-step instructions that tells you how to cook a dish.",ex:"Follow the ___ carefully or your cake will fail.",hard:3},
  {w:"quantity",vn:"số lượng",emoji:"🔢",def:"How much or how many of something there is.",ex:"The ___ of each ingredient is written in grams.",hard:2},
  {w:"spring rolls",vn:"chả giò",emoji:"🥢",def:"A Vietnamese snack – thin crispy rolls filled with meat and vegetables, then fried.",ex:"I like eating ___ dipped in sweet chilli sauce.",hard:2},
  {w:"omelette",vn:"trứng rán",emoji:"🍳",def:"A simple dish made by mixing eggs and cooking them flat in a pan.",ex:"She makes an ___ with cheese for breakfast.",hard:2},
  {w:"butter",vn:"bơ",emoji:"🧈",def:"A soft yellow food made from cream that you spread on bread or use for cooking.",ex:"I need ___ and eggs to make pancakes.",hard:1},
  {w:"pancake",vn:"bánh rán",emoji:"🥞",def:"A flat, round, soft cake made from flour, eggs, and milk and cooked in a pan.",ex:"___ with maple syrup is my favourite Sunday breakfast.",hard:1},
  {w:"broth",vn:"nước lèo",emoji:"🍲",def:"A light, clear soup made by boiling meat or vegetables in water for a long time.",ex:"The ___ for pho is simmered for many hours.",hard:3},
  {w:"taste",vn:"hương vị / vị",emoji:"😋",def:"The feeling in your mouth when you eat something – sweet, salty, sour, bitter, or rich.",ex:"Pho has a very unique ___ that is hard to describe.",hard:2},
  {w:"sticky rice",vn:"xôi",emoji:"🍚",def:"A type of rice that becomes soft and sticks together when cooked; very popular in Vietnam.",ex:"There are many kinds of ___ with different toppings.",hard:3},
  {w:"traditional food",vn:"món ăn truyền thống",emoji:"🇻🇳",def:"A dish that people in a country have cooked and eaten for hundreds of years.",ex:"Pho is the most famous ___ of Vietnam.",hard:3},
  {w:"eating habits",vn:"thói quen ăn uống",emoji:"🥗",def:"The things you usually eat and drink every day and how you eat them.",ex:"Write about your ___ – what do you eat every day?",hard:3},
  {w:"eel soup",vn:"súp lươn",emoji:"🍜",def:"A warm soup made with eel, a long fish-like river animal; a famous dish from Nghe An.",ex:"___ is a famous dish from Nghe An province.",hard:3},
  {w:"beef noodle soup",vn:"phở bò",emoji:"🍜",def:"Vietnam's most famous dish – rice noodles in a hot beef broth, served with fresh herbs.",ex:"___ is eaten for breakfast by millions of Vietnamese.",hard:2},
  {w:"allow",vn:"cho phép",emoji:"🙋",def:"To say yes and let someone do something.",ex:"His mum doesn't ___ him to drink juice before dinner.",hard:2},
  {w:"can",vn:"lon",emoji:"🥫",def:"A small metal container used to store food or drinks for a long time.",ex:"How many ___ of tomatoes do you need for the sauce?",hard:1},
  {w:"teaspoon",vn:"muỗng cà phê",emoji:"🥄",def:"A small spoon, often used to measure a small amount of something in cooking.",ex:"Add one ___ of salt and stir well.",hard:2},
  {w:"gram",vn:"gam",emoji:"⚖️",def:"A very small unit used to measure how heavy something is. 1,000 grams = 1 kilogram.",ex:"The recipe needs 200 ___ of flour.",hard:1},
  {w:"litre",vn:"lít",emoji:"🫗",def:"A unit used to measure liquid. A large bottle of water is usually one ___.",ex:"Drink at least one ___ of water every day.",hard:1},
  {w:"millilitre",vn:"mi-li-lít",emoji:"💉",def:"A very small unit of liquid. There are 1,000 millilitres in one litre.",ex:"Use 400 ___ of milk for this pancake batter.",hard:2},
  {w:"slice",vn:"lát / miếng",emoji:"🔪",def:"A thin flat piece cut from food, like a slice of bread or a slice of meat.",ex:"Cut the pork into thin ___ before adding it to the broth.",hard:2},
  {w:"stew",vn:"món hầm",emoji:"🫕",def:"A hot dish made by cooking meat and vegetables slowly in liquid for a long time.",ex:"She made a beef ___ that simmered for two hours.",hard:2},

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function pickUnique(pool,n){
  // Weight by difficulty: hard:3 appears 4x, hard:2 appears 2x, hard:1 appears 1x
  const weighted=[];
  pool.forEach(item=>{
    const times=item.hard>=3?4:item.hard===2?2:1;
    for(let i=0;i<times;i++) weighted.push(item);
  });
  const seen=new Set(),result=[];
  for(const item of shuffle(weighted)){
    if(!seen.has(item.w)){seen.add(item.w);result.push(item);if(result.length>=n)break;}
  }
  return result;
}

function getDistractors(correct,all,n=3){
  return shuffle(all.filter(x=>x.w!==correct.w)).slice(0,n);
}

function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US";u.rate=0.85;
  window.speechSynthesis.speak(u);
}

function initQueue(pid){
  const panel=panels.find(p=>p.id===pid);
  const s=state[pid];
  const all=panel.data();
  s.queue=pickUnique(all,Math.min(12,all.length));
  s.idx=0;s.correct=0;s.wrong=0;s.streak=0;s.answered=false;s.matchState=null;
}

// TABS

function buildTabs(){
  const row=document.getElementById("tabRow");
  const container=document.getElementById("panelContainer");
  row.innerHTML="";container.innerHTML="";
  panels.forEach((p)=>{
    const btn=document.createElement("button");
    btn.className="tab-btn";btn.textContent=p.label;btn.id="tab_"+p.id;
    btn.onclick=()=>activateTab(p.id);
    row.appendChild(btn);
    const div=document.createElement("div");
    div.className="panel";div.id="panel_"+p.id;
    container.appendChild(div);
  });
  activateTab("v5a");
}

function activateTab(id){
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  document.getElementById("tab_"+id).classList.add("active");
  document.getElementById("panel_"+id).classList.add("active");
  renderPanel(id);
}

// ═══════════════════════════════════════════
// RENDER PANEL
// ═══════════════════════════════════════════
function renderPanel(pid){
  const s=state[pid];
  if(!s.queue.length) initQueue(pid);
  const el=document.getElementById("panel_"+pid);
  const gtHtml=gameTypes.map(g=>`
    <button class="btn btn-${g.color} btn-sm" style="${s.gameMode===g.id?'outline:3px solid #000;outline-offset:2px;':'opacity:0.75;'}"
      onclick="setMode('${pid}','${g.id}')">${g.label}</button>`).join("");
  el.innerHTML=`
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px;">
      ${gtHtml}
      <div class="score-badge" id="score_${pid}">${s.correct} / ${s.queue.length}</div>
    </div>
    <div class="section-card" id="card_${pid}">
      <div id="qarea_${pid}"></div>
    </div>`;
  renderQuestion(pid);
}

function setMode(pid,mode){
  state[pid].gameMode=mode;
  initQueue(pid);
  renderPanel(pid);
}

function renderQuestion(pid){
  const s=state[pid];
  if(s.idx>=s.queue.length&&s.gameMode!=="fillblanks"&&s.gameMode!=="errorspot"&&s.gameMode!=="match"&&s.gameMode!=="tts"){showResult(pid);return;}
  const mode=s.gameMode;
  if(mode==="picword") renderPicWord(pid);
  else if(mode==="defpick") renderDefPick(pid);
  else if(mode==="fillblanks") renderFillBlanks(pid);
  else if(mode==="missletter") renderMissLetter(pid);
  else if(mode==="errorspot") renderErrorSpot(pid);
  else if(mode==="match") renderMatch(pid);
  else if(mode==="tts") renderTTS(pid);
}

function progressHtml(pid){
  const s=state[pid];
  const pct=Math.round((s.idx/s.queue.length)*100);
  return `
    <div class="progress-text">
      <span>Câu ${s.idx+1} / ${s.queue.length}</span>
      <span>${s.streak>1?'🔥 '+s.streak+' liên tiếp':''}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;
}

function controlBtnsHtml(pid,mode){
  return `<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
    <button class="btn btn-yellow btn-sm" onclick="showAnswer('${pid}','${mode}')">💡 Xem đáp án</button>
    <button class="btn btn-gray btn-sm" onclick="shuffleQ('${pid}')">🔀 Câu khác</button>
  </div>`;
}

function showAnswer(pid,mode){
  const s=state[pid];
  const item=s.queue[s.idx];
  const box=document.getElementById("ans_"+pid);
  if(!box)return;
  box.innerHTML=`💡 Đáp án: <strong>${item.w}</strong> = <em>${item.vn}</em>`;
  box.classList.add("show");
}

function shuffleQ(pid){
  const s=state[pid];
  const panel=panels.find(p=>p.id===pid);
  const all=panel.data();
  const others=all.filter(x=>x.w!==s.queue[s.idx].w);
  if(!others.length)return;
  s.queue[s.idx]=shuffle(others)[0];
  s.answered=false;
  renderQuestion(pid);
}

// ─────────────────────────────────────────────
// GAME 3: ✏️ Fill in the blank — one sentence at a time + word bank
// ─────────────────────────────────────────────
function renderFillBlanks(pid){
  const s=state[pid];
  const panel=panels.find(p=>p.id===pid);
  const groups=panel.fillG||[];
  if(!groups.length){renderDefPick(pid);return;}

  // Init group & items if needed
  if(!s._fillItems||s._fillItems.length===0){
    if(s._fillGroup===undefined) s._fillGroup=0;
    const grp=groups[s._fillGroup % groups.length];
    s._fillItems=shuffle([...grp.items]);
    s._fillIdx=0;
    s._fillCorrect=0;
    s._fillWrong=0;
  }

  const items=s._fillItems;
  const idx=s._fillIdx||0;
  s.answered=false;

  if(idx>=items.length){
    // Show group result
    const total=items.length;
    const pct=Math.round((s._fillCorrect/total)*100);
    let emoji="😅",msg="Cần ôn thêm!";
    if(pct>=90){emoji="🏆";msg="Xuất sắc!";}
    else if(pct>=70){emoji="🌟";msg="Giỏi lắm!";}
    else if(pct>=50){emoji="💪";msg="Ổn đấy, cố thêm!";}
    document.getElementById("qarea_"+pid).innerHTML=`
      <div style="text-align:center;padding:24px 8px;">
        <div style="font-size:56px;margin-bottom:8px;">${emoji}</div>
        <div style="font-family:'Baloo 2',sans-serif;font-size:clamp(20px,4vw,32px);font-weight:800;margin-bottom:6px;">${msg}</div>
        <div style="font-size:clamp(15px,2.3vw,22px);font-weight:700;color:var(--muted);margin-bottom:18px;">${s._fillCorrect} / ${total} đúng (${pct}%)</div>
        <button class="btn btn-primary" style="width:100%;font-size:clamp(15px,2.2vw,19px);padding:13px 24px;border-radius:14px;" onclick="nextFillGroup('${pid}')">🔄 Bộ câu mới</button>
      </div>`;
    document.getElementById("score_"+pid).textContent=`${s._fillCorrect}/${total}`;
    return;
  }

  const item=items[idx];
  // Word bank = all 12 words for this group, shuffled once
  if(!s._fillWordBank) s._fillWordBank=shuffle(items.map(x=>x.w));
  const wordList=s._fillWordBank;

  const pct=Math.round((idx/items.length)*100);
  const progressHtmlFill=`
    <div class="progress-text">
      <span>Câu ${idx+1} / ${items.length}</span>
      <span>${(s._fillCorrect||0)} đúng · ${(s._fillWrong||0)} sai</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;

  // Build sentence with blank slot
  const sentParts=item.sentence.split("___");
  const slotHtml=`<span id="fslot_${pid}" style="display:inline-block;min-width:110px;border-bottom:3px solid var(--primary);text-align:center;padding:2px 10px;cursor:pointer;color:var(--primary);font-weight:800;font-size:clamp(16px,2.4vw,22px);"
    onclick="fillSlotClick('${pid}')">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>`;

  let html=progressHtmlFill+`
    <div class="q-label">✏️ Điền từ vào chỗ trống <span class="badge">Word Bank</span></div>
    <div style="margin-bottom:10px;font-size:clamp(12px,1.6vw,14px);font-weight:700;color:var(--muted);">
      📦 Chọn từ trong ô → nhấp vào chỗ trống để điền:
    </div>
    <div class="word-bank" id="wb_${pid}">`;
  wordList.forEach(w=>{
    html+=`<span class="word-chip" id="fchip_${pid}_${escId(w)}" onclick="fillSelectChip('${pid}','${escQ(w)}')">${w}</span>`;
  });
  html+=`</div>
    <div style="padding:14px 18px;background:#f8f9fa;border-radius:14px;border-left:4px solid var(--primary);margin-bottom:16px;">
      <span style="font-size:clamp(15px,2.4vw,22px);font-weight:700;line-height:2;">
        ${sentParts[0]}${slotHtml}${sentParts[1]||""}
      </span>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
      <button class="btn btn-primary btn-sm" onclick="checkFillOne('${pid}','${escQ(item.w)}')">✅ Kiểm tra</button>
      <button class="btn btn-yellow btn-sm" onclick="showFillOneAnswer('${pid}','${escQ(item.w)}')">💡 Xem đáp án</button>
      <button class="btn btn-gray btn-sm" onclick="shuffleFillOne('${pid}')">🔀 Câu khác</button>
    </div>
    <div class="answer-box" id="ans_${pid}"></div>
    <div class="feedback" id="fb_${pid}"></div>
    <button class="next-btn" id="next_${pid}" onclick="nextFillOne('${pid}')">➡ Câu tiếp theo</button>`;

  document.getElementById("qarea_"+pid).innerHTML=html;
  document.getElementById("score_"+pid).textContent=`Điền từ ${idx+1}/${items.length}`;
  s._fillSelected=null;
  s._fillAnswered=false;
}

function fillSelectChip(pid,word){
  const s=state[pid];
  if(s._fillAnswered) return;
  // Deselect old
  if(s._fillSelected){
    document.getElementById("fchip_"+pid+"_"+escId(s._fillSelected))?.classList.remove("selected");
  }
  s._fillSelected=word;
  document.getElementById("fchip_"+pid+"_"+escId(word))?.classList.add("selected");
  // auto-fill the slot
  const slot=document.getElementById("fslot_"+pid);
  if(slot){slot.textContent=word;slot.style.color="var(--purple)";slot.style.borderColor="var(--purple)";}
}

function fillSlotClick(pid){
  // clicking slot clears it
  const s=state[pid];
  if(s._fillAnswered) return;
  if(s._fillSelected){
    document.getElementById("fchip_"+pid+"_"+escId(s._fillSelected))?.classList.remove("selected");
    s._fillSelected=null;
  }
  const slot=document.getElementById("fslot_"+pid);
  if(slot){slot.innerHTML="&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;";slot.style.color="var(--primary)";slot.style.borderColor="var(--primary)";}
}

function checkFillOne(pid,answer){
  const s=state[pid];
  if(s._fillAnswered) return;
  const chosen=s._fillSelected;
  if(!chosen) return;
  s._fillAnswered=true;
  s.answered=true;
  const fb=document.getElementById("fb_"+pid);
  const next=document.getElementById("next_"+pid);
  const slot=document.getElementById("fslot_"+pid);
  // Lock all chips
  document.querySelectorAll(`[id^="fchip_${pid}_"]`).forEach(c=>c.style.pointerEvents="none");
  if(chosen.toLowerCase()===answer.toLowerCase()){
    s._fillCorrect=(s._fillCorrect||0)+1;
    if(slot){slot.style.color="var(--green)";slot.style.borderColor="var(--green)";}
    fb.innerHTML=`✅ Đúng! <strong>${answer}</strong>`;fb.className="feedback show ok";
  } else {
    s._fillWrong=(s._fillWrong||0)+1;
    if(slot){slot.textContent=chosen;slot.style.color="var(--red)";slot.style.borderColor="var(--red)";}
    fb.innerHTML=`❌ Sai! Đáp án đúng: <strong>${answer}</strong>`;fb.className="feedback show bad";
  }
  if(next) next.classList.add("show");
}

function showFillOneAnswer(pid,answer){
  const box=document.getElementById("ans_"+pid);
  if(box){box.innerHTML=`💡 Đáp án: <strong>${answer}</strong>`;box.classList.add("show");}
  const slot=document.getElementById("fslot_"+pid);
  if(slot){slot.textContent=answer;slot.style.color="var(--yellow)";slot.style.borderColor="var(--yellow)";}
}

function shuffleFillOne(pid){
  // Replace current item with a random one from the same group
  const s=state[pid];
  const items=s._fillItems;
  if(!items||items.length<2) return;
  const others=items.filter((_,i)=>i!==s._fillIdx);
  const picked=shuffle(others)[0];
  s._fillItems[s._fillIdx]=picked;
  s._fillAnswered=false;
  s._fillSelected=null;
  renderFillBlanks(pid);
}

function nextFillOne(pid){
  const s=state[pid];
  s._fillIdx=(s._fillIdx||0)+1;
  s._fillAnswered=false;
  s._fillSelected=null;
  renderFillBlanks(pid);
}

function nextFillGroup(pid){
  const s=state[pid];
  s._fillGroup=(s._fillGroup||0)+1;
  s._fillItems=null;
  s._fillIdx=0;
  s._fillCorrect=0;
  s._fillWrong=0;
  s._fillWordBank=null;
  s._fillSelected=null;
  s._fillAnswered=false;
  renderFillBlanks(pid);
}

function checkLetterType(pid,answer){
  const s=state[pid];
  if(s.answered) return;
  const inp=document.getElementById("ltinp_"+pid);
  if(!inp) return;
  const val=inp.value.trim().toLowerCase();

    s.correct++;s.streak++;

// ─────────────────────────────────────────────
// GAME 5: 🔍 Error Spotting — subtle errors
// ─────────────────────────────────────────────
function renderErrorSpot(pid){
  const s=state[pid];
  const panel=panels.find(p=>p.id===pid);
  const errPool=panel.errItems||[];
  if(!errPool.length){renderFillBlanks(pid);return;}

  if(!s._errPool||!s._errPool.length){
    s._errPool=shuffle([...errPool]);
    s._errIdx=0;
  }
  const item=s._errPool[s._errIdx % s._errPool.length];
  s._currentErr=item;
  s.answered=false;

  // Parse sentence: <ERR>word</ERR> marks the wrong word
  const rawSentence=item.sentence;
  const wrongWord=item.wrong;

  // Tokenize keeping <ERR> markers
  let displaySentence=rawSentence;
  // Build token array
  const parts=rawSentence.split(/(<ERR>.*?<\/ERR>)/g);
  let html=progressHtml(pid)+`
    <div class="q-label">🔍 Tìm từ SAI trong câu và nhấn vào nó <span class="badge">Error Spotting</span></div>
    <div style="padding:10px 14px;background:var(--orange-light);border-radius:10px;margin-bottom:12px;font-size:clamp(12px,1.6vw,14px);font-weight:700;color:var(--orange);">
      ⚠️ Một từ trong câu bên dưới bị sai. Tìm và nhấn vào từ đó!
    </div>
    <div class="error-sentence" id="errsent_${pid}">`;

  parts.forEach((part,pi)=>{
    const errMatch=part.match(/^<ERR>(.*?)<\/ERR>$/);
    if(errMatch){
      const word=errMatch[1];
      html+=`<span class="underline-word" id="epart_${pid}_${pi}" onclick="checkErrNew('${pid}',true,'${escQ(word)}','${escQ(item.right)}')" data-iswrong="1">${word}</span>`;
    } else {
      // tokenize remaining words
      const tokens=part.split(/(\s+)/);
      tokens.forEach((tok,ti)=>{
        if(/^\s+$/.test(tok)){html+=tok;}
        else if(tok){
          html+=`<span class="underline-word" id="epart_${pid}_${pi}_${ti}" onclick="checkErrNew('${pid}',false,'${escQ(tok)}','${escQ(item.right)}')" data-iswrong="0">${tok}</span>`;
        }
      });
    }
  });

  html+=`</div>
    <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;">
      <button class="btn btn-yellow btn-sm" onclick="showErrAnswer('${pid}')">💡 Xem đáp án</button>
      <button class="btn btn-gray btn-sm" onclick="nextErrQ('${pid}')">🔀 Câu khác</button>
    </div>
    <div class="answer-box" id="ans_${pid}"></div>
    <div class="feedback" id="fb_${pid}" style="margin-top:10px;"></div>
    <button class="next-btn" id="next_${pid}" onclick="nextErrQ('${pid}')">➡ Câu tiếp theo</button>`;

  document.getElementById("qarea_"+pid).innerHTML=html;
  document.getElementById("score_"+pid).textContent=`${s.correct} / ${s._errPool.length}`;
}

function checkErrNew(pid,isWrong,clickedWord,rightWord){
  const s=state[pid];
  if(s.answered) return;
  s.answered=true;
  const fb=document.getElementById("fb_"+pid);
  const next=document.getElementById("next_"+pid);
  const item=s._currentErr;

  // Highlight all wrong-marked spans
  document.querySelectorAll(`[id^="epart_${pid}_"]`).forEach(sp=>{
    if(sp.dataset.iswrong==="1") sp.classList.add("error-found");
    sp.style.pointerEvents="none";
  });

  if(isWrong){
    s.correct++;s.streak++;
    fb.innerHTML=`✅ Đúng! Từ "<strong>${clickedWord}</strong>" bị sai – từ đúng phải là "<strong>${rightWord}</strong>".`;
    fb.className="feedback show ok";
  } else {
    s.wrong++;s.streak=0;
    fb.innerHTML=`❌ Sai rồi! Từ bạn chọn không phải lỗi. Từ sai là "<strong>${item.wrong}</strong>" – nên thay bằng "<strong>${item.right}</strong>".`;
    fb.className="feedback show bad";
  }
  if(next) next.classList.add("show");
}

function showErrAnswer(pid){
  const s=state[pid];
  const item=s._currentErr;
  if(!item) return;
  const box=document.getElementById("ans_"+pid);
  if(box){box.innerHTML=`💡 Từ sai: <strong>${item.wrong}</strong> → phải là <strong>${item.right}</strong>`;box.classList.add("show");}
}

function nextErrQ(pid){
  const s=state[pid];
  s._errIdx=(s._errIdx||0)+1;
  s.answered=false;
  if(s._errIdx>=s._errPool.length){
    s._errPool=shuffle([...(panels.find(p=>p.id===pid).errItems||[])]);
    s._errIdx=0;
  }
  renderErrorSpot(pid);
}

// ─────────────────────────────────────────────
// GAME 6: 🔗 Match — Vietnamese LEFT (numbered), English RIGHT (no numbers)
// Students see Vietnamese number → write English word
// ─────────────────────────────────────────────
function renderMatch(pid){
  const s=state[pid];
  const panel=panels.find(p=>p.id===pid);

  if(!s.matchState||s.matchState.done){
    // Weight harder words more
    const all=panel.data();
    const hard=all.filter(x=>x.hard>=3);
    const med=all.filter(x=>x.hard===2);
    const easy=all.filter(x=>x.hard<=1);
    const weighted=[...hard,...hard,...med,...easy];
    const items=pickUnique(weighted,6);
    s.matchState={items,leftSel:null,rightSel:null,matched:new Set(),done:false,matchCorrect:0,matchWrong:0};
    s.answered=false;
  }

  const ms=s.matchState;
  // LEFT: Vietnamese with numbers, shuffled independently
  const leftItems=shuffle(ms.items.map((x,i)=>({...x, origIdx:i})));
  // RIGHT: English words shuffled, no numbers
  const rightItems=shuffle(ms.items.map(x=>x.w));

  // Store order for selection logic
  ms._leftOrder=leftItems;
  ms._rightOrder=rightItems;

  let html=`
    <div class="q-label">🔗 Nối nghĩa tiếng Việt với từ tiếng Anh <span class="badge">Matching</span></div>
    <div style="padding:10px 14px;background:var(--green-light);border-radius:10px;margin-bottom:12px;font-size:clamp(12px,1.6vw,14px);font-weight:700;color:var(--green);">
      ✏️ Nhấn số tiếng Việt → rồi nhấn từ tiếng Anh để nối. Khi luyện trên lớp: viết số và chép lại chữ tiếng Anh!
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
      <button class="btn btn-yellow btn-sm" onclick="showMatchAnswer('${pid}')">💡 Xem đáp án</button>
      <button class="btn btn-gray btn-sm" onclick="resetMatch('${pid}')">🔀 Bộ câu khác</button>
    </div>
    <div class="answer-box" id="ans_${pid}"></div>
    <div class="match-cols">
      <div>
        <div class="match-col-label">🇻🇳 Tiếng Việt (có số)</div>`;

  leftItems.forEach((item,i)=>{
    const matched=ms.matched.has(item.w);
    const sel=ms.leftSel===i;
    html+=`<div class="match-item${matched?' matched':''}${sel?' selected':''}" id="ml_${pid}_${i}"
      onclick="selectLeft('${pid}',${i})">
      <span class="match-num">${i+1}</span>${item.vn}
    </div>`;
  });

  html+=`</div><div>
    <div class="match-col-label">🇬🇧 Tiếng Anh</div>`;

  rightItems.forEach((w,i)=>{
    const matched=ms.matched.has(w);
    const sel=ms.rightSel===i;
    html+=`<div class="match-item${matched?' matched':''}${sel?' selected':''}" id="mr_${pid}_${i}"
      onclick="selectRight('${pid}',${i})">${w}</div>`;
  });

  html+=`</div></div>
    <div class="feedback" id="fb_${pid}" style="margin-top:10px;"></div>
    <button class="next-btn" id="next_${pid}" onclick="resetMatch('${pid}')">🔄 Bộ câu mới</button>`;

  document.getElementById("qarea_"+pid).innerHTML=html;
  document.getElementById("score_"+pid).textContent=`${ms.matchCorrect}/${ms.items.length} đúng`;

  if(ms.leftSel!==null) document.getElementById(`ml_${pid}_${ms.leftSel}`)?.classList.add("selected");
  if(ms.rightSel!==null) document.getElementById(`mr_${pid}_${ms.rightSel}`)?.classList.add("selected");
}

function selectLeft(pid,idx){
  const ms=state[pid].matchState;
  if(!ms) return;
  const item=ms._leftOrder[idx];
  if(ms.matched.has(item.w)) return;
  ms.leftSel=idx;
  ms._leftWord=item.w;
  checkMatchPair(pid);
  renderMatch(pid);
}

function selectRight(pid,idx){
  const ms=state[pid].matchState;
  if(!ms) return;
  const w=ms._rightOrder[idx];
  if(ms.matched.has(w)) return;
  ms.rightSel=idx;
  ms._rightWord=w;
  checkMatchPair(pid);
  renderMatch(pid);
}

function checkMatchPair(pid){
  const ms=state[pid].matchState;
  if(!ms||ms.leftSel===null||ms.rightSel===null) return;
  const word=ms._leftWord;
  const rightWord=ms._rightWord;
  const fb=document.getElementById("fb_"+pid);
  if(word===rightWord){
    ms.matched.add(word);
    ms.matchCorrect++;
    if(fb){fb.textContent=`✅ Đúng! "${word}"`;fb.className="feedback show ok";}
    if(ms.matched.size===ms.items.length){
      ms.done=true;
      if(fb){fb.textContent=`🎉 Tuyệt vời! Nối đúng tất cả ${ms.items.length} cặp!`;fb.className="feedback show ok";}
      document.getElementById("next_"+pid)?.classList.add("show");
    }
  } else {
    ms.matchWrong++;
    if(fb){fb.textContent="❌ Chưa đúng! Thử lại nhé.";fb.className="feedback show bad";}
    const ml=document.getElementById(`ml_${pid}_${ms.leftSel}`);
    const mr=document.getElementById(`mr_${pid}_${ms.rightSel}`);
    if(ml){ml.classList.add("wrong-flash");setTimeout(()=>ml.classList.remove("wrong-flash"),350);}
    if(mr){mr.classList.add("wrong-flash");setTimeout(()=>mr.classList.remove("wrong-flash"),350);}
  }
  ms.leftSel=null;ms.rightSel=null;ms._leftWord=null;ms._rightWord=null;
}

function showMatchAnswer(pid){
  const ms=state[pid].matchState;
  if(!ms) return;
  const box=document.getElementById("ans_"+pid);
  if(!box) return;
  const pairs=ms._leftOrder.map((x,i)=>`<strong>${i+1}.</strong> ${x.vn} = <em>${x.w}</em>`).join(" &nbsp;|&nbsp; ");
  box.innerHTML=`💡 Đáp án: ${pairs}`;
  box.classList.add("show");
}

function resetMatch(pid){
  state[pid].matchState=null;
  renderMatch(pid);
}

// ─────────────────────────────────────────────
// GAME 7: 🔊 Listen & Guess — 2 sub-modes
// OPEN: type the word / MCQ: choose A B C D
// ─────────────────────────────────────────────
function renderTTS(pid){
  const s=state[pid];
  const panel=panels.find(p=>p.id===pid);
  const ttsPool=shuffle(panel.ttsPool||panel.data());
  if(!s._ttsPool||!s._ttsPool.length){
    s._ttsPool=shuffle([...ttsPool]);
    s._ttsIdx=0;
  }
  const item=s._ttsPool[s._ttsIdx % s._ttsPool.length];
  s._ttsItem=item;
  s.answered=false;

  const subMode=s.ttsSubMode||"open";

  let html=`
    <div class="subtab-row">
      <button class="subtab-btn${subMode==='open'?' active':''}" onclick="setTTSMode('${pid}','open')">✏️ Tự luận</button>
      <button class="subtab-btn${subMode==='mcq'?' active':''}" onclick="setTTSMode('${pid}','mcq')">🔠 Trắc nghiệm</button>
    </div>
    <div class="q-label">🔊 Nghe câu → đoán từ còn thiếu <span class="badge">Listen & Guess</span></div>
    <div style="text-align:center;margin:10px 0 18px;">
      <button class="tts-btn" id="tts_${pid}" onclick="speakTTSSentence('${pid}')">
        🔊 Bấm để nghe từ
      </button>
    </div>`;

  // Show example sentence with blank as context (no audio for sentence)
  const sentence=(item.sentence||item.ex||"").replace(new RegExp(item.w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i'),"<strong style='color:var(--primary);border-bottom:3px solid var(--primary);'>______</strong>");
  html+=`<div class="q-sentence" style="background:var(--primary-light);padding:14px 18px;border-radius:12px;margin-bottom:16px;font-size:clamp(14px,2.2vw,19px);">${sentence}</div>`;

  if(subMode==="open"){
    html+=`<input class="letter-type-input" id="ttsinp_${pid}" placeholder="Gõ từ bạn vừa nghe..."
      autocomplete="off" autocorrect="off" spellcheck="false"
      onkeydown="if(event.key==='Enter')checkTTSOpen('${pid}','${escQ(item.w)}')" />
      <div style="text-align:center;margin-bottom:12px;">
        <button class="btn btn-primary" onclick="checkTTSOpen('${pid}','${escQ(item.w)}')">✅ Kiểm tra</button>
      </div>`;
  } else {
    // MCQ
    const allPool=panel.ttsPool||panel.data();
    const distractors=shuffle(allPool.filter(x=>x.w!==item.w)).slice(0,3);
    const opts=shuffle([item,...distractors]);
    const letters=["A","B","C","D"];
    html+=`<div class="options-grid" id="opts_${pid}">`;
    opts.forEach((opt,i)=>{
      html+=`<button class="opt-btn" onclick="checkWord('${pid}','${escQ(opt.w)}','${escQ(item.w)}')">
        <span class="opt-letter">${letters[i]}</span>${opt.w}</button>`;
    });
    html+=`</div>`;
  }

  html+=`<div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;">
      <button class="btn btn-yellow btn-sm" onclick="showTTSAnswer('${pid}')">💡 Xem đáp án</button>
      <button class="btn btn-gray btn-sm" onclick="nextTTSQ('${pid}')">🔀 Câu khác</button>
    </div>
    <div class="answer-box" id="ans_${pid}"></div>
    <div class="feedback" id="fb_${pid}"></div>
    <button class="next-btn" id="next_${pid}" onclick="nextTTSQ('${pid}')">➡ Câu tiếp theo</button>`;

  document.getElementById("qarea_"+pid).innerHTML=html;
  document.getElementById("score_"+pid).textContent=`${s.correct} / ${s._ttsPool.length}`;
  setTimeout(()=>speakTTSSentence(pid),500);
  if(subMode==="open") setTimeout(()=>document.getElementById("ttsinp_"+pid)?.focus(),100);
}

function speakTTSSentence(pid){
  const s=state[pid];
  const item=s._ttsItem;
  if(!item) return;
  // Speak only the vocabulary word (not the full sentence)
  const btn=document.getElementById("tts_"+pid);
  speak(item.w);
  const dur=Math.max(1200, item.w.length*120);
  if(btn){btn.classList.add("speaking");setTimeout(()=>btn.classList.remove("speaking"),dur);}
}

function checkTTSOpen(pid,answer){
  const s=state[pid];
  if(s.answered) return;
  const inp=document.getElementById("ttsinp_"+pid);
  if(!inp) return;
  const val=inp.value.trim().toLowerCase();
  const ans=answer.toLowerCase();
  s.answered=true;
  const fb=document.getElementById("fb_"+pid);
  const next=document.getElementById("next_"+pid);
  inp.disabled=true;
  if(val===ans){
    s.correct++;s.streak++;
    inp.classList.add("correct");
    fb.innerHTML=`✅ Đúng! <strong>${answer}</strong> = ${s._ttsItem.vn} ${s._ttsItem.emoji}`;
    fb.className="feedback show ok";
    speak(answer);
  } else {
    s.wrong++;s.streak=0;
    inp.classList.add("wrong");
    fb.innerHTML=`❌ Sai! Đáp án: <strong>${answer}</strong> = ${s._ttsItem.vn}`;
    fb.className="feedback show bad";
  }
  document.getElementById("score_"+pid).textContent=`${s.correct} / ${s._ttsPool.length}`;
  if(next) next.classList.add("show");
}

function showTTSAnswer(pid){
  const s=state[pid];
  const item=s._ttsItem;
  if(!item) return;
  const box=document.getElementById("ans_"+pid);
  if(box){box.innerHTML=`💡 Đáp án: <strong>${item.w}</strong> = <em>${item.vn}</em> ${item.emoji}`;box.classList.add("show");}
}

function setTTSMode(pid,mode){
  state[pid].ttsSubMode=mode;
  state[pid].answered=false;
  renderTTS(pid);
}

function nextTTSQ(pid){
  const s=state[pid];
  s._ttsIdx=(s._ttsIdx||0)+1;
  s.answered=false;
  const panel=panels.find(p=>p.id===pid);
  const pool=panel.ttsPool||panel.data();
  if(s._ttsIdx>=pool.length){
    s._ttsPool=shuffle([...pool]);
    s._ttsIdx=0;
  }
  renderTTS(pid);
}

// ═══════════════════════════════════════════
// CHECK / NEXT (shared for MCQ games)
// ═══════════════════════════════════════════
function checkWord(pid,chosen,answer){
  const s=state[pid];
  if(s.answered) return;
  s.answered=true;
  const fb=document.getElementById("fb_"+pid);
  const next=document.getElementById("next_"+pid);
  const opts=document.querySelectorAll(`#opts_${pid} .opt-btn`);

  opts.forEach(b=>{
    b.disabled=true;
    const txt=b.textContent.slice(1).trim();
    if(txt===answer) b.classList.add("correct");
    else if(txt===chosen&&chosen!==answer) b.classList.add("wrong");
  });

  const item=s._ttsItem||s.queue[s.idx];
  if(chosen===answer){
    s.correct++;s.streak++;
    fb.innerHTML=`✅ Đúng! <strong>${answer}</strong> = ${item?.vn||""} ${item?.emoji||""}`;
    fb.className="feedback show ok";
    speak(answer);
  } else {
    s.wrong++;s.streak=0;
    fb.innerHTML=`❌ Sai! Đáp án đúng: <strong>${answer}</strong> = ${item?.vn||""} ${item?.emoji||""}`;
    fb.className="feedback show bad";
  }

  const scoreEl=document.getElementById("score_"+pid);
  if(scoreEl) scoreEl.textContent=`${s.correct} / ${s.queue.length}`;
  if(next) next.classList.add("show");
}

function nextQ(pid){
  state[pid].idx++;
  state[pid].answered=false;
  renderQuestion(pid);
}

// ═══════════════════════════════════════════
// RESULT SCREEN
// ═══════════════════════════════════════════
function showResult(pid){
  const s=state[pid];
  const total=s.queue.length;
  const pct=Math.round((s.correct/total)*100);
  let emoji="😅",msg="Cần ôn thêm nhé!";
  if(pct>=90){emoji="🏆";msg="Xuất sắc! Tuyệt vời!";}
  else if(pct>=70){emoji="🌟";msg="Giỏi lắm! Cố thêm tí nữa!";}
  else if(pct>=50){emoji="💪";msg="Ổn đấy! Ôn thêm nhé!";}
  document.getElementById("qarea_"+pid).innerHTML=`
    <div style="text-align:center;padding:28px 8px;">
      <div style="font-size:64px;margin-bottom:8px;">${emoji}</div>
      <div style="font-family:'Baloo 2',sans-serif;font-size:clamp(20px,4vw,34px);font-weight:800;margin-bottom:6px;">${msg}</div>
      <div style="font-size:clamp(16px,2.5vw,24px);font-weight:700;color:var(--muted);margin-bottom:18px;">${s.correct} / ${total} đúng (${pct}%)</div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:22px;">
        <span style="padding:8px 18px;border-radius:50px;background:var(--green-light);color:var(--green);font-weight:800;">✅ ${s.correct} đúng</span>
        <span style="padding:8px 18px;border-radius:50px;background:var(--red-light);color:var(--red);font-weight:800;">❌ ${s.wrong} sai</span>
      </div>
      <button class="btn btn-primary" style="font-size:clamp(15px,2.3vw,20px);padding:14px 28px;border-radius:14px;width:100%;" onclick="restartPanel('${pid}')">🔄 Chơi lại (câu mới ngẫu nhiên)</button>
    </div>`;
}

function restartPanel(pid){
  initQueue(pid);
  renderPanel(pid);
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function escQ(s){return (s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'");}
function escId(s){return (s||"").replace(/[^a-zA-Z0-9]/g,"_");}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
buildTabs();
</script>
