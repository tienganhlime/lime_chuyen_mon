<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module 5 — Grammar Games</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#0f0f0f;
  --coral:#ff5c3a; --coral-t:#fff1ee;
  --amber:#f5a623; --amber-t:#fffbeb;
  --jade:#00a878;  --jade-t:#e6faf5;
  --sky:#3b82f6;   --sky-t:#eff6ff;
  --violet:#7c3aed;--violet-t:#f5f0ff;
  --rose:#e11d74;  --rose-t:#fff0f6;
  --teal:#0891b2;  --teal-t:#ecfeff;
  --shadow:0 8px 40px rgba(0,0,0,.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#fafafa;color:var(--ink);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
.blobs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.09;}
.b1{width:600px;height:600px;background:var(--coral);top:-200px;left:-150px;}
.b2{width:500px;height:500px;background:var(--sky);top:0;right:-150px;}
.b3{width:400px;height:400px;background:var(--jade);bottom:-100px;left:20%;}
.b4{width:300px;height:300px;background:var(--amber);bottom:80px;right:5%;}
.b5{width:350px;height:350px;background:var(--violet);top:40%;left:5%;}

/* ── TOP NAV (topics) ── */
header{position:sticky;top:0;z-index:200;background:rgba(250,250,250,.97);backdrop-filter:blur(20px);border-bottom:2px solid #ebebeb;padding:0 16px;}
.header-row1{display:flex;align-items:center;gap:10px;min-height:56px;flex-wrap:wrap;}
.logo{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:900;white-space:nowrap;flex-shrink:0;}
.logo span{color:var(--coral);}
.topic-tabs{display:flex;gap:5px;flex-wrap:wrap;flex:1;}
.ttab{padding:6px 14px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.78rem;font-weight:700;border:2px solid #e0e0e0;background:#fff;border-radius:100px;cursor:pointer;transition:all .18s;color:#666;white-space:nowrap;}
.ttab:hover{border-color:var(--sky);color:var(--sky);}
.ttab.ta{background:var(--coral);border-color:var(--coral);color:#fff;}
.ttab.tb{background:var(--jade);border-color:var(--jade);color:#fff;}
.ttab.tc{background:var(--violet);border-color:var(--violet);color:#fff;}
.ttab.td{background:var(--teal);border-color:var(--teal);color:#fff;}
.ttab.te{background:var(--amber);border-color:var(--amber);color:#fff;}
.prog{font-size:.9rem;font-weight:800;color:#bbb;white-space:nowrap;margin-left:auto;}

/* ── SUB-NAV (exercises) ── */
.sub-nav{display:flex;gap:5px;flex-wrap:wrap;padding:8px 16px 10px;border-top:1px solid #efefef;background:rgba(250,250,250,.97);}
.stab{padding:4px 11px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.73rem;font-weight:700;border:2px solid #e0e0e0;background:#fff;border-radius:100px;cursor:pointer;transition:all .16s;color:#888;white-space:nowrap;}
.stab:hover{border-color:var(--sky);color:var(--sky);}
.stab.active{color:#fff;}
.sub-a .stab.active{background:var(--coral);border-color:var(--coral);}
.sub-b .stab.active{background:var(--jade);border-color:var(--jade);}
.sub-c .stab.active{background:var(--violet);border-color:var(--violet);}
.sub-d .stab.active{background:var(--teal);border-color:var(--teal);}
.sub-e .stab.active{background:var(--amber);border-color:var(--amber);}

main{flex:1;position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;padding:24px 16px 48px;}
.card{width:100%;max-width:900px;background:#fff;border:2.5px solid #e8e8e8;border-radius:28px;box-shadow:var(--shadow);padding:36px 44px 32px;position:relative;overflow:hidden;animation:cardIn .34s cubic-bezier(.22,.9,.36,1) both;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;}
.ca::before{background:linear-gradient(90deg,var(--coral),var(--amber));}
.cb::before{background:linear-gradient(90deg,var(--jade),var(--sky));}
.cc::before{background:linear-gradient(90deg,var(--violet),var(--rose));}
.cd::before{background:linear-gradient(90deg,var(--teal),var(--jade));}
.ce::before{background:linear-gradient(90deg,var(--amber),var(--coral));}
@keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(.985);}to{opacity:1;transform:none;}}

.lbl{display:inline-flex;align-items:center;padding:5px 14px;border-radius:100px;font-size:.72rem;font-weight:800;letter-spacing:1.3px;text-transform:uppercase;margin-bottom:14px;}
.la{background:var(--coral-t);color:var(--coral);border:1.5px solid #ffc4b8;}
.lb{background:var(--jade-t);color:var(--jade);border:1.5px solid #9fe8d5;}
.lc{background:var(--violet-t);color:var(--violet);border:1.5px solid #d4b8ff;}
.ld{background:var(--teal-t);color:var(--teal);border:1.5px solid #a5e1ef;}
.le{background:var(--amber-t);color:#9a640a;border:1.5px solid #f5c77a;}
.ex-ref{font-size:.75rem;font-weight:700;color:#bbb;letter-spacing:.5px;margin-bottom:6px;}
.qnum{font-size:.85rem;font-weight:700;color:#bbb;margin-bottom:8px;}
.score-badge{display:inline-block;background:var(--jade-t);color:var(--jade);border:1.5px solid #9fe8d5;border-radius:100px;padding:3px 12px;font-size:.8rem;font-weight:700;margin-left:10px;}
.hint{display:inline-flex;align-items:center;gap:6px;background:var(--amber-t);border:1.5px solid #f5c77a;color:#9a640a;border-radius:10px;padding:6px 14px;font-size:.88rem;font-weight:600;margin-bottom:14px;}

/* MCQ */
.mcq-q{font-size:1.5rem;font-weight:700;line-height:1.7;margin-bottom:18px;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.opt{padding:13px 18px;background:#fafafa;border:2.5px solid #e8e8e8;border-radius:13px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .16s;text-align:left;}
.opt:hover{border-color:var(--sky);background:var(--sky-t);transform:translateY(-1px);}
.opt.correct{background:var(--jade-t)!important;border-color:var(--jade)!important;color:var(--jade)!important;}
.opt.wrong{background:var(--rose-t)!important;border-color:var(--rose)!important;color:var(--rose)!important;}
.opt.disabled{pointer-events:none;}

/* FILL */
.fill-s{font-size:1.5rem;font-weight:700;line-height:1.8;margin-bottom:14px;}
.fill-in{display:inline-block;border:none;border-bottom:3px solid #ccc;background:transparent;font-family:'Plus Jakarta Sans',sans-serif;font-size:1.35rem;font-weight:700;width:160px;text-align:center;outline:none;padding:2px 6px;transition:border-color .2s;color:var(--sky);}
.fill-in:focus{border-color:var(--sky);}
.fill-in.ok{border-color:var(--jade);color:var(--jade);}
.fill-in.bad{border-color:var(--rose);color:var(--rose);}
.ans-pill{display:inline-block;background:var(--coral-t);border:2px solid var(--coral);border-radius:100px;padding:3px 16px;color:transparent;font-size:1rem;font-weight:800;transition:color .3s;margin-top:8px;}
.ans-pill.show{color:var(--coral);}
.word-box{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;padding:12px 16px;background:var(--sky-t);border:2px solid #bfdbfe;border-radius:14px;}
.word-box-lbl{width:100%;font-size:.78rem;font-weight:800;color:var(--sky);letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px;}
.wb-chip{padding:6px 14px;background:#fff;border:2px solid var(--sky);border-radius:100px;font-size:1rem;font-weight:700;color:var(--sky);cursor:pointer;transition:all .15s;}
.wb-chip:hover{background:var(--sky);color:#fff;transform:translateY(-1px);}
.wb-chip.wb-used{opacity:.35;pointer-events:none;text-decoration:line-through;}

/* ERROR */
.err-s{font-size:1.5rem;font-weight:700;line-height:1.8;margin-bottom:14px;}
.err-span{border-bottom:3px dotted #aaa;border-radius:4px;padding:0 4px;transition:all .3s;}
.err-span.rev{background:var(--rose-t);border-bottom:3px solid var(--rose);color:var(--rose);text-decoration:line-through;}
.fix-span{display:inline-block;background:var(--jade-t);border:2px solid var(--jade);border-radius:8px;padding:2px 12px;color:transparent;font-weight:800;font-size:1.35rem;transition:color .3s;margin-left:4px;}
.fix-span.rev{color:var(--jade);}
.fix-row{margin-top:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.fix-lbl{font-size:.95rem;font-weight:700;color:#999;}

/* SCRAMBLE */
.word-bank{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:20px;}
.chip{padding:8px 16px;background:var(--violet-t);border:2.5px solid var(--violet);border-radius:100px;font-size:1.1rem;font-weight:700;color:var(--violet);cursor:pointer;transition:all .16s;user-select:none;}
.chip:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(124,58,237,.18);}
.chip.used{opacity:.3;pointer-events:none;}
.built{min-height:56px;border:2.5px dashed #d4d4d4;border-radius:14px;padding:12px 16px;font-size:1.25rem;font-weight:700;color:var(--ink);margin-bottom:12px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;}
.bw{padding:5px 11px;background:var(--violet-t);border:2px solid var(--violet);border-radius:7px;color:var(--violet);font-size:1.1rem;font-weight:700;cursor:pointer;}
.bw:hover{background:#ddd0ff;}
.ans-line{font-size:1.25rem;font-weight:800;color:transparent;border-radius:12px;padding:11px 16px;background:var(--jade-t);border:2px solid var(--jade);transition:color .3s;margin-top:8px;}
.ans-line.show{color:var(--jade);}
.chk-res{margin-top:10px;font-size:.95rem;font-weight:700;padding:8px 14px;border-radius:11px;display:none;}
.chk-res.ok{background:var(--jade-t);color:var(--jade);display:block;}
.chk-res.no{background:var(--rose-t);color:var(--rose);display:block;}

/* EXPLAIN */
.why{margin-top:14px;background:#f7f7f7;border:2px solid #e8e8e8;border-radius:13px;padding:13px 18px;font-size:.97rem;font-weight:600;color:transparent;line-height:1.6;transition:color .3s;}
.why.show{color:#3a3a3a;}

/* CONTROLS */
.ctrl{display:flex;gap:9px;margin-top:22px;flex-wrap:wrap;align-items:center;}
.btn{display:inline-flex;align-items:center;gap:7px;padding:11px 22px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.95rem;font-weight:700;border-radius:100px;cursor:pointer;border:2.5px solid transparent;transition:all .16s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 5px 18px rgba(0,0,0,.11);}
.btn:active{transform:none;}
.b-rev{background:var(--sky);color:#fff;border-color:var(--sky);}
.b-nxt{background:var(--jade);color:#fff;border-color:var(--jade);}
.b-chk{background:var(--violet);color:#fff;border-color:var(--violet);}
.b-clr{background:#fff;color:#666;border-color:#ccc;}
.b-rst{background:var(--coral);color:#fff;border-color:var(--coral);}
.b-shuf{background:var(--amber);color:#fff;border-color:var(--amber);}

/* FINISH */
.finish{text-align:center;padding:36px 16px;}
.f-emoji{font-size:3.8rem;display:block;margin-bottom:12px;}
.f-title{font-family:'Fraunces',serif;font-size:2.2rem;font-weight:900;margin-bottom:8px;}
.f-sub{font-size:1.05rem;color:#999;font-weight:600;}
.f-score{font-size:1.45rem;font-weight:800;color:var(--jade);margin-top:14px;}

@media(max-width:620px){
  .card{padding:22px 16px 20px;}
  .opts{grid-template-columns:1fr;}
  .mcq-q,.fill-s,.err-s{font-size:1.15rem;}
}
</style>
</head>
<body>
<div class="blobs">
  <div class="blob b1"></div><div class="blob b2"></div>
  <div class="blob b3"></div><div class="blob b4"></div><div class="blob b5"></div>
</div>

<header>
  <div class="header-row1">
    <div class="logo">Module 5 <span>Games</span></div>
    <div class="topic-tabs" id="topicTabs"></div>
    <div class="prog" id="prog">1 / 1</div>
  </div>
  <div class="sub-nav" id="subNav"></div>
</header>

<main>
  <div class="card ca" id="card">
    <div id="qa"></div>
    <div class="ctrl" id="ctrl"></div>
  </div>
</main>

<script>
// ══════════════════════════════════════════════════════════
// DATA — organised by TOPIC → EXERCISE
// ══════════════════════════════════════════════════════════

const TOPICS = [
  {
    id:'noun', label:'🔤 Danh từ C/U', color:'a',
    exercises:[
      {
        id:'ex2', label:'Ex2 – Nhận biết C/U',
        questions:[
          {type:'mcq',ref:'Danh từ · Ex2 – tr.4',q:'"record" là danh từ loại nào?',opts:['Đếm được (C)','Không đếm được (U)'],c:0,ex:'✅ "Record" (đĩa nhạc, hồ sơ) = đếm được (C). Có thể nói: a record, two records.'},
          {type:'mcq',ref:'Danh từ · Ex2 – tr.4',q:'"money" là danh từ loại nào?',opts:['Đếm được (C)','Không đếm được (U)'],c:1,ex:'✅ "Money" = U. Không nói "a money" hay "moneys". Đúng: some money, a lot of money.'},
          {type:'mcq',ref:'Danh từ · Ex2 – tr.4',q:'"tree" là danh từ loại nào?',opts:['Đếm được (C)','Không đếm được (U)'],c:0,ex:'✅ "Tree" = đếm được (C). a tree, three trees, many trees.'},
          {type:'mcq',ref:'Danh từ · Ex2 – tr.4',q:'"furniture" là danh từ loại nào?',opts:['Đếm được (C)','Không đếm được (U)'],c:1,ex:'✅ "Furniture" = U. Sai: a furniture, furnitures. Đúng: some furniture, a piece of furniture.'},
          {type:'mcq',ref:'Danh từ · Ex2 – tr.4',q:'"evidence" là danh từ loại nào?',opts:['Đếm được (C)','Không đếm được (U)'],c:1,ex:'✅ "Evidence" (bằng chứng) = U. Đúng: some evidence, a piece of evidence.'},
          {type:'mcq',ref:'Danh từ · Ex2 – tr.4',q:'"TV set" là danh từ loại nào?',opts:['Đếm được (C)','Không đếm được (U)'],c:0,ex:'✅ "TV set" = C. Có thể nói: a TV set, two TV sets.'},
          {type:'mcq',ref:'Danh từ · Ex2 – tr.4',q:'"happiness" là danh từ loại nào?',opts:['Đếm được (C)','Không đếm được (U)'],c:1,ex:'✅ "Happiness" = U. Danh từ trừu tượng. Tương tự: sadness, safety, knowledge, music.'},
          {type:'mcq',ref:'Danh từ · Ex2 – tr.4',q:'"safety" là danh từ loại nào?',opts:['Đếm được (C)','Không đếm được (U)'],c:1,ex:'✅ "Safety" = U. Danh từ trừu tượng thường không đếm được.'},
          {type:'mcq',ref:'Danh từ · Ex2 – tr.4',q:'"bottle" là danh từ loại nào?',opts:['Đếm được (C)','Không đếm được (U)'],c:0,ex:'✅ "Bottle" = C. a bottle, two bottles. "a bottle of water" dùng bottle để đếm nước.'},
          {type:'mcq',ref:'Danh từ · Ex2 – tr.4',q:'"bread" là danh từ loại nào?',opts:['Đếm được (C)','Không đếm được (U)'],c:1,ex:'✅ "Bread" = U. Sai: a bread, breads. Đúng: some bread, a loaf of bread.'},
          {type:'mcq',ref:'Danh từ · Ex2 – tr.4',q:'"knowledge" là danh từ loại nào?',opts:['Đếm được (C)','Không đếm được (U)'],c:1,ex:'✅ "Knowledge" = U. Đúng: some knowledge, a lot of knowledge.'},
          {type:'mcq',ref:'Danh từ · Ex2 – tr.4',q:'"wall" là danh từ loại nào?',opts:['Đếm được (C)','Không đếm được (U)'],c:0,ex:'✅ "Wall" = C. a wall, two walls.'},
          {type:'mcq',ref:'Danh từ · Ex2 – tr.4',q:'"advice" là danh từ loại nào?',opts:['Đếm được (C)','Không đếm được (U)'],c:1,ex:'✅ "Advice" = U. Sai: an advice, advices. Đúng: some advice, a piece of advice.'},
          {type:'mcq',ref:'Danh từ · Ex2 – tr.4',q:'"baggage" là danh từ loại nào?',opts:['Đếm được (C)','Không đếm được (U)'],c:1,ex:'✅ "Baggage" = U. Giống "luggage". Đúng: some baggage, a piece of baggage.'},
          {type:'mcq',ref:'Danh từ · Ex2 – tr.4',q:'"information" là danh từ loại nào?',opts:['Đếm được (C)','Không đếm được (U)'],c:1,ex:'✅ "Information" = U. Sai: an information. Đúng: some information, a piece of information.'},
          {type:'mcq',ref:'Danh từ · Ex2 – tr.4',q:'"window" là danh từ loại nào?',opts:['Đếm được (C)','Không đếm được (U)'],c:0,ex:'✅ "Window" = C. a window, two windows.'},
          {type:'mcq',ref:'Danh từ · Ex2 – tr.4',q:'"music" là danh từ loại nào?',opts:['Đếm được (C)','Không đếm được (U)'],c:1,ex:'✅ "Music" = U. Danh từ nghệ thuật/khái niệm.'},
          {type:'mcq',ref:'Danh từ · Ex2 – tr.4',q:'"boat" là danh từ loại nào?',opts:['Đếm được (C)','Không đếm được (U)'],c:0,ex:'✅ "Boat" = C. a boat, two boats.'},
        ]
      },
      {
        id:'ex5', label:'Ex5 – Chọn đáp án đúng',
        questions:[
          {type:'mcq',ref:'Danh từ · Ex5 – tr.5',q:'If you want to hear the news, you can read ___.', opts:['paper','a paper'],c:1,ex:'✅ "A paper" = một tờ báo (C). "Paper" không mạo từ = chất liệu giấy (U).'},
          {type:'mcq',ref:'Danh từ · Ex5 – tr.5',q:"I want to write letters but I haven't got ___ to write on.",opts:['a paper','any paper'],c:1,ex:'✅ "Paper" = giấy (U) → "any paper" trong câu phủ định.'},
          {type:'mcq',ref:'Danh từ · Ex5 – tr.5',q:'There was ___ on inside the house.',opts:['light','a light'],c:1,ex:'✅ "A light" = một ngọn đèn cụ thể (C). "Light" = ánh sáng (U).'},
          {type:'mcq',ref:'Danh từ · Ex5 – tr.5',q:'___ comes from the sun.',opts:['Light','A light'],c:0,ex:'✅ "Light" (ánh sáng tự nhiên) = U.'},
          {type:'mcq',ref:'Danh từ · Ex5 – tr.5',q:"I was in a hurry. I didn't have ___ for breakfast.",opts:['time','a time'],c:0,ex:'✅ "Time" = U → "didn\'t have time".'},
          {type:'mcq',ref:'Danh từ · Ex5 – tr.5',q:'"Did you enjoy your holiday?" – "Yes, we had ___ ."',opts:['wonderful time','a wonderful time'],c:1,ex:'✅ "Have a wonderful time" = cụm cố định dùng "a".'},
          {type:'mcq',ref:'Danh từ · Ex5 – tr.5',q:'Sue was helpful. She gave us some very useful ___.',opts:['advice','advices'],c:0,ex:'✅ "Advice" = U → không thêm -s. Đúng: some useful advice / a piece of advice.'},
          {type:'mcq',ref:'Danh từ · Ex5 – tr.5',q:'We had ___ while we were on holiday.',opts:['very bad weather','a very bad weather'],c:0,ex:'✅ "Weather" = U → không dùng "a weather".'},
          {type:'mcq',ref:'Danh từ · Ex5 – tr.5',q:'We were very unfortunate. We had ___.',opts:['bad luck','a bad luck'],c:0,ex:'✅ "Luck" = U → không dùng "a luck".'},
          {type:'mcq',ref:'Danh từ · Ex5 – tr.5',q:"It's very difficult to find ___ at the moment.",opts:['a work','a job'],c:1,ex:'✅ "Work" = U. "Job" = C (việc làm cụ thể). Đúng: find a job.'},
          {type:'mcq',ref:'Danh từ · Ex5 – tr.5',q:'I had to buy ___ because I wanted to make sandwiches.',opts:['a bread','some bread'],c:1,ex:'✅ "Bread" = U → không dùng "a bread". Đúng: some bread / a loaf of bread.'},
          {type:'mcq',ref:'Danh từ · Ex5 – tr.5',q:'Bad news ___ make people happy.',opts:["don't","doesn't"],c:1,ex:'✅ "News" trông như số nhiều nhưng là U → "doesn\'t".'},
          {type:'mcq',ref:'Danh từ · Ex5 – tr.5',q:'___ too long. You should have ___ cut.',opts:['Your hair is / it','Your hairs are / them'],c:0,ex:'✅ "Hair" thường dùng số ít U → "your hair is too long" / "have it cut".'},
        ]
      },
      {

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
let curTopicIdx = 0;
let curExIdx    = 0;
let qi = 0, score = 0, builtWords = [];
let curQuestions = [];  // working copy

const allTopics = [...TOPICS, MIX_TOPIC];

// ══════════════════════════════════════════════════════════
// BUILD NAV
// ══════════════════════════════════════════════════════════
function buildNav(){
  const tt = document.getElementById('topicTabs');
  tt.innerHTML = '';
  allTopics.forEach((t,ti)=>{
    const btn = document.createElement('button');
    btn.className = 'ttab' + (ti===curTopicIdx ? ' t'+t.color : '');
    btn.textContent = t.label;
    btn.onclick = () => { curTopicIdx=ti; curExIdx=0; startExercise(); };
    tt.appendChild(btn);
  });

  const sn = document.getElementById('subNav');
  sn.className = 'sub-nav sub-'+allTopics[curTopicIdx].color;
  sn.innerHTML = '';
  const exs = allTopics[curTopicIdx].exercises;
  exs.forEach((ex,ei)=>{
    const btn = document.createElement('button');
    btn.className = 'stab' + (ei===curExIdx ? ' active' : '');
    btn.textContent = ex.label;
    btn.onclick = () => { curExIdx=ei; startExercise(); };
    sn.appendChild(btn);
  });

  // update card colour stripe
  document.getElementById('card').className = 'card c'+allTopics[curTopicIdx].color;
}

// ══════════════════════════════════════════════════════════
// START / RENDER
// ══════════════════════════════════════════════════════════
function startExercise(){
  const t = allTopics[curTopicIdx];
  // for mix, re-shuffle each time
  if(t.id === 'mix'){
    const all = [];
    TOPICS.forEach(tp => tp.exercises.forEach(ex => ex.questions.forEach(q => all.push({...q}))));
    for(let i=all.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[all[i],all[j]]=[all[j],all[i]];}
    t.exercises[0].questions = all;
  }
  curQuestions = [...t.exercises[curExIdx].questions];
  qi=0; score=0; builtWords=[];
  buildNav();
  render();
}

function shuffleNow(){
  for(let i=curQuestions.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[curQuestions[i],curQuestions[j]]=[curQuestions[j],curQuestions[i]];}
  qi=0; score=0; builtWords=[];
  render();
}

function render(){
  const tc = allTopics[curTopicIdx].color;
  document.getElementById('prog').textContent = (qi+1)+'/'+curQuestions.length;
  const qa=document.getElementById('qa'), ctrl=document.getElementById('ctrl');
  qa.innerHTML=''; ctrl.innerHTML='';
  builtWords=[];
  const q = curQuestions[qi];

  const top=document.createElement('div');
  top.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap;';
  top.innerHTML=`<span class="lbl l${tc}">${allTopics[curTopicIdx].label}</span><span class="score-badge">✅ ${score}/${qi}</span>`;
  qa.appendChild(top);

  if(q.ref){const r=document.createElement('div');r.className='ex-ref';r.textContent='📄 '+q.ref;qa.appendChild(r);}
  const qn=document.createElement('div');qn.className='qnum';qn.textContent='Câu '+(qi+1)+' / '+curQuestions.length;qa.appendChild(qn);

  if(q.type==='mcq')renderMCQ(q,qa,ctrl,tc);
  else if(q.type==='fill')renderFill(q,qa,ctrl,tc);
  else if(q.type==='error')renderError(q,qa,ctrl);
  else if(q.type==='scramble')renderScramble(q,qa,ctrl);
}

// ══════════════════════════════════════════════════════════
// RENDERERS (unchanged logic, only colour-aware)
// ══════════════════════════════════════════════════════════
function renderMCQ(q,qa,ctrl,tc){
  const qd=document.createElement('div');qd.className='mcq-q';qd.textContent=q.q;qa.appendChild(qd);
  const og=document.createElement('div');og.className='opts';
  let ans=false;
  const reveal=(clicked)=>{
    if(ans)return;ans=true;
    og.querySelectorAll('.opt').forEach((btn,j)=>{
      btn.classList.add('disabled');
      if(j===q.c)btn.classList.add('correct');
      else if(clicked!==undefined&&j===clicked&&clicked!==q.c)btn.classList.add('wrong');
    });
    if(clicked===q.c)score++;
    addWhy(q.ex,qa);
    ctrl.innerHTML='';ctrl.appendChild(mkb('Tiếp theo →','btn b-nxt',next));
  };
  q.opts.forEach((o,i)=>{
    const b=document.createElement('button');b.className='opt';
    b.innerHTML=`<b style="margin-right:7px">${'ABCD'[i]}.</b>${o}`;
    b.onclick=()=>reveal(i);og.appendChild(b);
  });
  qa.appendChild(og);
  ctrl.appendChild(mkb('👁 Xem đáp án','btn b-rev',()=>reveal(undefined)));
  ctrl.appendChild(mkb('🔀 Tráo câu','btn b-shuf',shuffleNow));
}

function renderFill(q,qa,ctrl){
  let inp;
  if(q.bank){
    const wb=document.createElement('div');wb.className='word-box';
    const wbl=document.createElement('div');wbl.className='word-box-lbl';wbl.textContent='📦 Chọn từ điền vào chỗ trống:';wb.appendChild(wbl);
    const chips=[];
    q.bank.forEach(w=>{
      const ch=document.createElement('span');ch.className='wb-chip';ch.textContent=w;
      ch.onclick=()=>{
        if(ch.classList.contains('wb-used'))return;
        inp.value=w;inp.focus();
        chips.forEach(c=>c.classList.remove('wb-used'));
        ch.classList.add('wb-used');
      };
      chips.push(ch);wb.appendChild(ch);
    });
    qa.appendChild(wb);
  }
  const parts=q.s.split('___');
  const sd=document.createElement('div');sd.className='fill-s';
  inp=document.createElement('input');inp.className='fill-in';inp.type='text';inp.placeholder='...';inp.autocomplete='off';
  if(q.a&&q.a.length>8)inp.style.width='220px';
  sd.appendChild(document.createTextNode(parts[0]));sd.appendChild(inp);
  if(parts[1])sd.appendChild(document.createTextNode(parts[1]));
  qa.appendChild(sd);
  const ar=document.createElement('div');ar.style.marginTop='10px';
  ar.innerHTML='<span style="font-weight:700;color:#bbb;font-size:.9rem;">Đáp án: </span>';
  const ap=document.createElement('span');ap.className='ans-pill';ap.textContent=q.a;ar.appendChild(ap);qa.appendChild(ar);
  const wy=document.createElement('div');wy.className='why';wy.textContent=q.ex;qa.appendChild(wy);
  let done=false;
  const check=()=>{
    if(done)return;done=true;
    const v=inp.value.trim().toLowerCase(),c=q.a.toLowerCase();
    inp.classList.add(v===c||c.includes(v)&&v.length>1?'ok':'bad');
    if(v===c)score++;
    ap.classList.add('show');wy.classList.add('show');
    ctrl.innerHTML='';ctrl.appendChild(mkb('Tiếp theo →','btn b-nxt',next));
  };
  inp.onkeydown=e=>{if(e.key==='Enter')check();};
  ctrl.appendChild(mkb('✓ Kiểm tra','btn b-chk',check));
  ctrl.appendChild(mkb('👁 Xem đáp án','btn b-rev',()=>{done=true;ap.classList.add('show');wy.classList.add('show');ctrl.innerHTML='';ctrl.appendChild(mkb('Tiếp theo →','btn b-nxt',next));}));
  ctrl.appendChild(mkb('🔀 Tráo câu','btn b-shuf',shuffleNow));
  inp.focus();
}

function renderError(q,qa,ctrl){
  const ht=document.createElement('div');ht.className='hint';
  ht.textContent='🐛 Câu sau có 1 lỗi sai — tìm và cho biết phải sửa thành gì';qa.appendChild(ht);
  const sd=document.createElement('div');sd.className='err-s';
  sd.innerHTML=q.s.replace(/<err>(.*?)<\/err>/g,'<span class="err-span" id="espan">$1</span>');
  qa.appendChild(sd);
  const fr=document.createElement('div');fr.className='fix-row';
  fr.innerHTML='<span class="fix-lbl">Sửa thành:</span>';
  const fs=document.createElement('span');fs.className='fix-span';fs.id='fspan';
  fs.textContent=q.fix;fr.appendChild(fs);qa.appendChild(fr);
  const wy=document.createElement('div');wy.className='why';wy.textContent=q.ex;qa.appendChild(wy);
  ctrl.appendChild(mkb('👁 Xem đáp án','btn b-rev',()=>{
    document.getElementById('espan').classList.add('rev');
    document.getElementById('fspan').classList.add('rev');
    wy.classList.add('show');
    ctrl.innerHTML='';ctrl.appendChild(mkb('Tiếp theo →','btn b-nxt',next));
  }));
  ctrl.appendChild(mkb('🔀 Tráo câu','btn b-shuf',shuffleNow));
  ctrl.appendChild(mkb('Tiếp theo →','btn b-nxt',next));
}

function renderScramble(q,qa,ctrl){
  const ht=document.createElement('div');ht.className='hint';
  ht.textContent='💡 Nhấn các từ theo thứ tự đúng · Nhấn từ đã chọn để bỏ';qa.appendChild(ht);
  const pm=document.createElement('div');pm.style.cssText='font-size:.85rem;font-weight:700;color:#888;margin-bottom:12px;';
  pm.textContent='SẮP XẾP THÀNH CÂU ĐÚNG:';qa.appendChild(pm);
  const built=document.createElement('div');built.className='built';built.id='built';
  built.innerHTML='<span style="color:#ccc;font-size:.9rem;font-weight:600;">Câu của bạn sẽ hiện ở đây…</span>';
  qa.appendChild(built);
  const shuffled=[...q.words].sort(()=>Math.random()-.5);
  const bank=document.createElement('div');bank.className='word-bank';
  shuffled.forEach(w=>{
    const ch=document.createElement('button');ch.className='chip';ch.textContent=w;
    ch.onclick=()=>{if(ch.classList.contains('used'))return;ch.classList.add('used');builtWords.push({w,chip:ch});rebuildBuilt(built);};
    bank.appendChild(ch);
  });
  qa.appendChild(bank);
  const al=document.createElement('div');al.className='ans-line';al.id='aline';al.textContent=q.ans;qa.appendChild(al);
  const cr=document.createElement('div');cr.className='chk-res';cr.id='cres';qa.appendChild(cr);
  const wy=document.createElement('div');wy.className='why';wy.id='swy';wy.textContent=q.ex;qa.appendChild(wy);
  ctrl.appendChild(mkb('✓ Kiểm tra','btn b-chk',()=>{
    const att=builtWords.map(x=>x.w).join(' ').replace(/[,.!?]/g,'').toLowerCase().trim();
    const cor=q.ans.replace(/[,.!?]/g,'').toLowerCase().trim();
    const cr=document.getElementById('cres');
    if(att===cor){cr.className='chk-res ok';cr.textContent='✅ Chính xác! Xuất sắc!';score++;document.getElementById('swy').classList.add('show');ctrl.innerHTML='';ctrl.appendChild(mkb('Tiếp theo →','btn b-nxt',next));}
    else{cr.className='chk-res no';cr.textContent='❌ Chưa đúng — thử lại hoặc xem đáp án nhé.';}
  }));
  ctrl.appendChild(mkb('Xóa','btn b-clr',()=>{builtWords=[];render();}));
  ctrl.appendChild(mkb('👁 Xem đáp án','btn b-rev',()=>{document.getElementById('aline').classList.add('show');document.getElementById('swy').classList.add('show');ctrl.innerHTML='';ctrl.appendChild(mkb('Tiếp theo →','btn b-nxt',next));}));
  ctrl.appendChild(mkb('🔀 Tráo câu','btn b-shuf',shuffleNow));
}

function rebuildBuilt(built){
  built.innerHTML='';
  if(!builtWords.length){built.innerHTML='<span style="color:#ccc;font-size:.9rem;font-weight:600;">Câu của bạn sẽ hiện ở đây…</span>';return;}
  builtWords.forEach((item,i)=>{
    const bw=document.createElement('span');bw.className='bw';bw.textContent=item.w;
    bw.onclick=()=>{item.chip.classList.remove('used');builtWords.splice(i,1);rebuildBuilt(built);};
    built.appendChild(bw);
  });
}

function addWhy(text,qa){
  const w=document.createElement('div');w.className='why';w.textContent=text;w.style.marginTop='16px';qa.appendChild(w);
  setTimeout(()=>w.classList.add('show'),40);
}

function next(){
  builtWords=[];
  if(qi<curQuestions.length-1){qi++;render();}
  else{
    const pct=Math.round(score/curQuestions.length*100);
    const e=pct>=80?'🎉':pct>=60?'👍':'💪';
    const m=pct>=80?'Xuất sắc!':pct>=60?'Khá tốt! Ôn thêm nhé!':'Cần ôn tập thêm!';
    document.getElementById('qa').innerHTML=`<div class="finish"><span class="f-emoji">${e}</span><div class="f-title">${allTopics[curTopicIdx].exercises[curExIdx].label}</div><div class="f-sub">${m}</div><div class="f-score">Điểm: ${score} / ${curQuestions.length} (${pct}%)</div></div>`;
    const ctrl=document.getElementById('ctrl');ctrl.innerHTML='';
    ctrl.appendChild(mkb('↩ Làm lại','btn b-rst',()=>{curQuestions=[...allTopics[curTopicIdx].exercises[curExIdx].questions];qi=0;score=0;builtWords=[];render();}));
    ctrl.appendChild(mkb('🔀 Tráo & làm lại','btn b-shuf',shuffleNow));
  }
}

function mkb(t,c,f){const b=document.createElement('button');b.className=c;b.innerHTML=t;b.onclick=f;return b;}

// INIT
startExercise();
</script>
